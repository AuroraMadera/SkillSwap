<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skillswap - Iniciar Sesión</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <main class="skillswap-page">
        <div class="skillswap-content">
            <div class="skillswap-info">
                <h1 class="skillswap-title">Skillswap</h1>
                <p class="skillswap-subtitle">plataforma de intercambio de habilidades</p>
                <p class="skillswap-desc">Conéctate con otros, aprende y enseña nuevas habilidades.</p>
            </div>

            <div class="login-panel">
                <div class="login-panel-header">
                    <h2>Iniciar Sesión</h2>
                </div>

                <form class="login-form">
                    <div class="input-group">
                        <label for="email">Correo Electrónico</label>
                        <input type="email" id="email" placeholder="Ingresa tu correo">
                    </div>

                    <div class="input-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" placeholder="Ingresa tu contraseña">
                    </div>

                    <button type="submit" class="login-btn">Iniciar Sesión</button>

                    <p class="register-text">
                        ¿No tienes una cuenta?
                        <a href="registrar.html" class="register-link">Regístrate</a>
                    </p>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
